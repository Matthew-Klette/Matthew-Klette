  <rect width="900" height="140" fill="url(#bg3)"/>

  <!-- Top + bottom rules -->
  <line x1="0" y1="1"   x2="900" y2="1"   stroke="url(#gold-h3)" stroke-width="1" stroke-opacity=".4"/>
  <line x1="0" y1="139" x2="900" y2="139" stroke="url(#gold-h3)" stroke-width="1" stroke-opacity=".4"/>

  <!-- Section label -->
  <g class="fadein">
    <text x="450" y="22" text-anchor="middle" fill="#2a2e38" font-size="9" class="sans" letter-spacing="4">TECH STACK</text>
  </g>

