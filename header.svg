<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" width="900">
  <defs>
    <style>
      @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulseRing{0%,100%{r:5;opacity:1}50%{r:8;opacity:.3}}
      @keyframes drawLine{from{stroke-dashoffset:1200}to{stroke-dashoffset:0}}
      @keyframes scanMove{from{transform:translateX(-200px)}to{transform:translateX(1100px)}}
      .f0{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .00s both}
      .f1{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .12s both}
      .f2{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .22s both}
      .f3{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .32s both}
      .f4{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .44s both}
      .pulse{animation:pulseRing 2.2s ease-in-out infinite}
      .scan{animation:scanMove 7s linear infinite}
      .ld{stroke-dasharray:1200;animation:drawLine 1.6s cubic-bezier(.22,1,.36,1) .05s both}
      text{font-family:'Georgia','Times New Roman',serif}
      .ss{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
    </style>
    <linearGradient id="hbg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090f"/><stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="orh" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6a00" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ff6a00"/>
      <stop offset="55%"  stop-color="#ff9a3c"/>
      <stop offset="80%"  stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orv" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6a00" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ff6a00" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#ffe8d6"/>
      <stop offset="100%" stop-color="#ff9a3c"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6a00" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff6a00" stop-opacity=".1"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="hc"><rect width="900" height="300"/></clipPath>
  </defs>
  <g clip-path="url(#hc)">
    <rect width="900" height="300" fill="url(#hbg)"/>
    <ellipse cx="450" cy="150" rx="420" ry="170" fill="url(#gc)"/>
    <g opacity=".025" stroke="#ff6a00" stroke-width=".5">
      <line x1="0" y1="75"  x2="900" y2="75"/>
      <line x1="0" y1="150" x2="900" y2="150"/>
      <line x1="0" y1="225" x2="900" y2="225"/>
      <line x1="225" y1="0" x2="225" y2="300"/>
      <line x1="450" y1="0" x2="450" y2="300"/>
      <line x1="675" y1="0" x2="675" y2="300"/>
    </g>
    <rect class="scan" x="0" y="0" width="200" height="300" fill="url(#sg)" opacity=".035"/>
    <line x1="0"   y1="1"   x2="900" y2="1"   stroke="url(#orh)" stroke-width="1.5" class="ld"/>
    <line x1="0"   y1="299" x2="900" y2="299" stroke="url(#orh)" stroke-width=".8"  class="ld"/>
    <line x1="1"   y1="0"   x2="1"   y2="300" stroke="url(#orv)" stroke-width="1.5" class="ld"/>
    <line x1="899" y1="0"   x2="899" y2="300" stroke="url(#orv)" stroke-width="1.5" class="ld"/>
    <g class="f0" stroke="#ff6a00" stroke-width="1.2" fill="none" opacity=".65">
      <polyline points="32,50 32,24 58,24"/>
      <polyline points="842,24 868,24 868,50"/>
      <polyline points="32,250 32,276 58,276"/>
      <polyline points="842,276 868,276 868,250"/>
    </g>
    <g class="f1">
      <circle class="pulse" cx="450" cy="38" r="5" fill="#ff6a00"/>
      <text x="463" y="43" fill="#ff6a00" font-size="9" class="ss" letter-spacing="2.5" font-weight="600">MARTECH ENGINEER  ·  KUHL.COM</text>
      <text x="433" y="43" fill="#ff6a00" font-size="9" class="ss" letter-spacing="2.5" font-weight="600" text-anchor="end">REMOTE  ·  SOUTH AFRICA</text>
    </g>
    <line x1="160" y1="56" x2="740" y2="56" stroke="#ff6a00" stroke-width=".4" stroke-opacity=".2" class="f1"/>
    <g class="f2">
      <text x="450" y="126" text-anchor="middle" fill="url(#ng)" font-size="64" font-weight="400" letter-spacing="10">MATT KLETTE</text>
    </g>
    <g class="f3">
      <!-- updated: #c8c8dc to match accomplishments -->
      <text x="450" y="156" text-anchor="middle" fill="#c8c8dc" font-size="11" class="ss" letter-spacing="5">GTM  ·  BIGQUERY  ·  DATA ENGINEERING  ·  AI AUTOMATION  ·  FULL-STACK</text>
    </g>
    <line x1="310" y1="172" x2="590" y2="172" stroke="#ff6a00" stroke-width=".4" stroke-opacity=".35" class="f3"/>
    <g class="f4">
      <rect x="88"  y="188" width="152" height="68" rx="2" fill="#0f0f18" stroke="#ff6a00" stroke-width=".4" stroke-opacity=".3"/>
      <text x="164" y="216" text-anchor="middle" fill="#ff9a3c" font-size="24" font-weight="400">5+</text>
      <text x="164" y="233" text-anchor="middle" fill="#c8c8dc" font-size="8"  class="ss" letter-spacing="2">YEARS EXPERIENCE</text>
      <text x="164" y="247" text-anchor="middle" fill="#9090a8" font-size="7"  class="ss" letter-spacing="1.5">SPECIALIST ENGINEER</text>

      <rect x="258" y="188" width="152" height="68" rx="2" fill="#0f0f18" stroke="#ff6a00" stroke-width=".4" stroke-opacity=".3"/>
      <text x="334" y="216" text-anchor="middle" fill="#ff9a3c" font-size="24" font-weight="400">30+</text>
      <text x="334" y="233" text-anchor="middle" fill="#c8c8dc" font-size="8"  class="ss" letter-spacing="2">TOOLS MASTERED</text>
      <text x="334" y="247" text-anchor="middle" fill="#9090a8" font-size="7"  class="ss" letter-spacing="1.5">ACROSS FULL STACK</text>

      <rect x="428" y="188" width="152" height="68" rx="2" fill="#0f0f18" stroke="#ff6a00" stroke-width=".5" stroke-opacity=".65"/>
      <text x="504" y="216" text-anchor="middle" fill="#ff9a3c" font-size="13" class="ss" letter-spacing=".5">GTM · BQ · AI</text>
      <text x="504" y="233" text-anchor="middle" fill="#c8c8dc" font-size="8"  class="ss" letter-spacing="2">CORE EXPERTISE</text>
      <text x="504" y="247" text-anchor="middle" fill="#9090a8" font-size="7"  class="ss" letter-spacing="1.5">PRECISION TRACKING</text>

      <rect x="598" y="188" width="152" height="68" rx="2" fill="#0f0f18" stroke="#ff6a00" stroke-width=".4" stroke-opacity=".3"/>
      <text x="674" y="216" text-anchor="middle" fill="#ff9a3c" font-size="13" class="ss" letter-spacing=".5">BCAD · CS</text>
      <text x="674" y="233" text-anchor="middle" fill="#c8c8dc" font-size="8"  class="ss" letter-spacing="2">COMPUTER SCIENCE</text>
      <text x="674" y="247" text-anchor="middle" fill="#9090a8" font-size="7"  class="ss" letter-spacing="1.5">EMERIS · SOUTH AFRICA</text>
    </g>
  </g>
</svg>
