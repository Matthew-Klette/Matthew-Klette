<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" width="900">
  <defs>
    <style>
      @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
      @keyframes pulse    { 0%,100% { opacity:1; r:5; } 50% { opacity:.4; r:7; } }
      @keyframes drawLine { from { stroke-dashoffset:900; } to { stroke-dashoffset:0; } }
      @keyframes scanMove { from { transform:translateX(-160px); } to { transform:translateX(900px); } }
      @keyframes countUp  { from { opacity:0; } to { opacity:1; } }

      .f0 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .05s both; }
      .f1 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .18s both; }
      .f2 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .30s both; }
      .f3 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .42s both; }
      .f4 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .54s both; }
      .f5 { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .66s both; }
      .line-draw { stroke-dasharray:900; animation: drawLine 1.4s cubic-bezier(.22,1,.36,1) .1s both; }
      .dot-pulse  { animation: pulse 2.4s ease-in-out infinite; }
      .scan       { animation: scanMove 6s linear infinite; opacity:.03; }

      text { font-family: 'Georgia', 'Times New Roman', serif; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#080b10"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>

    <linearGradient id="accent-h" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c9a96e"/>
      <stop offset="70%"  stop-color="#e8c98a"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="accent-v" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c9a96e" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="name-grad" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="main-clip">
      <rect width="900" height="320"/>
    </clipPath>
  </defs>

  <g clip-path="url(#main-clip)">
    <!-- Base -->
    <rect width="900" height="320" fill="url(#bg)"/>

    <!-- Subtle grid pattern -->
    <g opacity=".025" stroke="#c9a96e" stroke-width=".5">
      <line x1="0" y1="80"  x2="900" y2="80"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="225" y1="0" x2="225" y2="320"/>
      <line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="675" y1="0" x2="675" y2="320"/>
    </g>

    <!-- Scan sweep -->
    <rect class="scan" x="0" y="0" width="160" height="320" fill="url(#accent-h)"/>

    <!-- Top border line -->
    <line x1="0" y1="1" x2="900" y2="1" stroke="url(#accent-h)" stroke-width="1.5" class="line-draw"/>

    <!-- Corner marks — top left -->
    <g class="f0" opacity=".7">
      <line x1="36" y1="28" x2="60" y2="28" stroke="#c9a96e" stroke-width="1"/>
      <line x1="36" y1="28" x2="36" y2="52" stroke="#c9a96e" stroke-width="1"/>
    </g>

    <!-- Corner marks — top right -->
    <g class="f0" opacity=".7">
      <line x1="864" y1="28" x2="840" y2="28" stroke="#c9a96e" stroke-width="1"/>
      <line x1="864" y1="28" x2="864" y2="52" stroke="#c9a96e" stroke-width="1"/>
    </g>

    <!-- Corner marks — bottom left -->
    <g class="f5" opacity=".7">
      <line x1="36" y1="292" x2="60" y2="292" stroke="#c9a96e" stroke-width="1"/>
      <line x1="36" y1="292" x2="36" y2="268" stroke="#c9a96e" stroke-width="1"/>
    </g>

    <!-- Corner marks — bottom right -->
    <g class="f5" opacity=".7">
      <line x1="864" y1="292" x2="840" y2="292" stroke="#c9a96e" stroke-width="1"/>
      <line x1="864" y1="292" x2="864" y2="268" stroke="#c9a96e" stroke-width="1"/>
    </g>

    <!-- Left accent line -->
    <line x1="1" y1="0" x2="1" y2="320" stroke="url(#accent-v)" stroke-width="1.5" class="line-draw"/>
    <!-- Right accent line -->
    <line x1="899" y1="0" x2="899" y2="320" stroke="url(#accent-v)" stroke-width="1.5" class="line-draw"/>

    <!-- Live status dot -->
    <g class="f1">
      <circle class="dot-pulse" cx="450" cy="46" r="5" fill="#c9a96e"/>
      <text x="462" y="51" fill="#c9a96e" font-size="10" font-weight="500" class="sans" letter-spacing="2">AVAILABLE FOR WORK</text>
      <text x="434" y="51" fill="#c9a96e" font-size="10" font-weight="500" class="sans" letter-spacing="2" text-anchor="end">MARTECH ENGINEER</text>
    </g>

    <!-- Thin rule under status -->
    <line x1="200" y1="62" x2="700" y2="62" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".3" class="f1"/>

    <!-- Main name -->
    <g class="f2">
      <text x="450" y="138" text-anchor="middle" fill="url(#name-grad)"
            font-size="62" font-weight="400" letter-spacing="8">MATT KLETTE</text>
    </g>

    <!-- Sub title -->
    <g class="f3">
      <text x="450" y="170" text-anchor="middle" fill="#7a8392"
            font-size="13" font-weight="400" letter-spacing="5" class="sans">
        GTM  ·  BIGQUERY  ·  EVENT INSTRUMENTATION  ·  DATA ENGINEERING
      </text>
    </g>

    <!-- Thin divider -->
    <line x1="340" y1="188" x2="560" y2="188" stroke="#c9a96e" stroke-width=".5" stroke-opacity=".4" class="f3"/>

    <!-- Stat cards row -->
    <g class="f4">
      <!-- Card 1 -->
      <rect x="100" y="206" width="140" height="72" rx="3" fill="#0e1117" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".4"/>
      <text x="170" y="234" text-anchor="middle" fill="#c9a96e"    font-size="26" font-weight="400">2</text>
      <text x="170" y="252" text-anchor="middle" fill="#3d4450"    font-size="9"  font-weight="400" class="sans" letter-spacing="2">IN PROGRESS</text>
      <text x="170" y="266" text-anchor="middle" fill="#2a2e36"    font-size="9"  font-weight="400" class="sans" letter-spacing="1">HIGH PRIORITY</text>

      <!-- Card 2 -->
      <rect x="260" y="206" width="140" height="72" rx="3" fill="#0e1117" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".4"/>
      <text x="330" y="234" text-anchor="middle" fill="#c9a96e"    font-size="26" font-weight="400">6</text>
      <text x="330" y="252" text-anchor="middle" fill="#3d4450"    font-size="9"  font-weight="400" class="sans" letter-spacing="2">IN REVIEW</text>
      <text x="330" y="266" text-anchor="middle" fill="#2a2e36"    font-size="9"  font-weight="400" class="sans" letter-spacing="1">READY TO SHIP</text>

      <!-- Card 3 -->
      <rect x="420" y="206" width="140" height="72" rx="3" fill="#0e1117" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".4"/>
      <text x="490" y="234" text-anchor="middle" fill="#c9a96e"    font-size="13" font-weight="400" class="sans" letter-spacing="1">GTM + BQ</text>
      <text x="490" y="252" text-anchor="middle" fill="#3d4450"    font-size="9"  font-weight="400" class="sans" letter-spacing="2">CORE STACK</text>
      <text x="490" y="266" text-anchor="middle" fill="#2a2e36"    font-size="9"  font-weight="400" class="sans" letter-spacing="1">EVENT TRACKING</text>

      <!-- Card 4 -->
      <rect x="580" y="206" width="140" height="72" rx="3" fill="#0e1117" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".4"/>
      <text x="650" y="234" text-anchor="middle" fill="#c9a96e"    font-size="13" font-weight="400" class="sans" letter-spacing="1">BCA  ·  CS</text>
      <text x="650" y="252" text-anchor="middle" fill="#3d4450"    font-size="9"  font-weight="400" class="sans" letter-spacing="2">DEGREE</text>
      <text x="650" y="266" text-anchor="middle" fill="#2a2e36"    font-size="9"  font-weight="400" class="sans" letter-spacing="1">COMPUTER SCIENCE</text>
    </g>

    <!-- Bottom rule -->
    <line x1="0" y1="319" x2="900" y2="319" stroke="url(#accent-h)" stroke-width=".8" stroke-opacity=".4" class="f5"/>
  </g>
</svg>
