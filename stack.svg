<svg viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg" width="900">
  <defs>
    <style>
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-1392px); }
      }
      .track { animation: marquee 22s linear infinite; }

      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      .fadein { animation: fadeIn .8s ease .1s both; }

      text { font-family: 'Georgia', 'Times New Roman', serif; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    </style>

    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#080b10"/>
      <stop offset="100%" stop-color="#090c12"/>
    </linearGradient>

    <linearGradient id="fade-l3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#080b10" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080b10" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="fade-r3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#080b10" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080b10" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="gold-h3" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c9a96e"/>
      <stop offset="70%"  stop-color="#e8c98a"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="mq-clip">
      <rect x="0" y="0" width="900" height="140"/>
    </clipPath>
