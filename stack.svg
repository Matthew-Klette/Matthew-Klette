        <text x="50" y="30" text-anchor="middle" class="badge-text" font-size="22" fill="#61DAFB">⚛</text>
        <text x="50" y="52" text-anchor="middle" class="badge-text">React</text>
        <text x="50" y="66" text-anchor="middle" class="badge-sub">Frontend</text>
      </g>

