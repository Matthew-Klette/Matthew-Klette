<svg viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg" width="900">
  <defs>
    <style>
      @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      .f0 { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .0s both; }
      .f1 { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both; }
      .f2 { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .2s both; }
      text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#090c12"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>
    <linearGradient id="gold-h4" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c9a96e"/>
      <stop offset="70%"  stop-color="#e8c98a"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="110" fill="url(#bg4)"/>

  <!-- Top rule -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="url(#gold-h4)" stroke-width=".8" stroke-opacity=".3"/>

  <!-- Label -->
  <g class="f0">
    <line x1="36" y1="34" x2="100" y2="34" stroke="#c9a96e" stroke-width=".5" stroke-opacity=".4"/>
    <text x="108" y="39" fill="#c9a96e" font-size="9" letter-spacing="3" font-weight="500">CONNECT</text>
    <line x1="192" y1="34" x2="864" y2="34" stroke="#c9a96e" stroke-width=".5" stroke-opacity=".1"/>
  </g>

  <!-- Three connect items centered -->
  <g class="f1">
    <!-- LinkedIn -->
    <rect x="200" y="52" width="148" height="36" rx="3" fill="#0b0f16" stroke="#1e2330" stroke-width="1"/>
    <text x="274" y="67" text-anchor="middle" fill="#3d4450" font-size="8" letter-spacing="2">LINKEDIN</text>
    <text x="274" y="80" text-anchor="middle" fill="#c9a96e" font-size="10" letter-spacing=".5">matthew-klette</text>

    <!-- GitHub -->
    <rect x="376" y="52" width="148" height="36" rx="3" fill="#0b0f16" stroke="#c9a96e" stroke-width=".4" stroke-opacity=".4"/>
    <text x="450" y="67" text-anchor="middle" fill="#3d4450" font-size="8" letter-spacing="2">GITHUB</text>
    <text x="450" y="80" text-anchor="middle" fill="#c9a96e" font-size="10" letter-spacing=".5">Matthew-Klette</text>

    <!-- KUHL -->
    <rect x="552" y="52" width="148" height="36" rx="3" fill="#0b0f16" stroke="#1e2330" stroke-width="1"/>
    <text x="626" y="67" text-anchor="middle" fill="#3d4450" font-size="8" letter-spacing="2">COMPANY</text>
    <text x="626" y="80" text-anchor="middle" fill="#c9a96e" font-size="10" letter-spacing=".5">KUHL  ·  MarTech</text>
  </g>

  <!-- Bottom rule -->
  <line x1="0" y1="109" x2="900" y2="109" stroke="url(#gold-h4)" stroke-width=".8" stroke-opacity=".2"/>
</svg>
