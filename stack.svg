        <rect width="100" height="80" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
        <text x="50" y="30" text-anchor="middle" class="badge-text" font-size="22">🐳</text>
        <text x="50" y="52" text-anchor="middle" class="badge-text">Docker</text>
        <text x="50" y="66" text-anchor="middle" class="badge-sub">Containers</text>
      </g>

      <!-- n8n -->
      <g transform="translate(1972,20)">
        <rect width="100" height="80" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
        <text x="50" y="30" text-anchor="middle" class="badge-text" font-size="22">⚙️</text>
        <text x="50" y="52" text-anchor="middle" class="badge-text">n8n</text>
        <text x="50" y="66" text-anchor="middle" class="badge-sub">Automation</text>
      </g>

      <!-- Firebase -->
      <g transform="translate(2088,20)">
        <rect width="100" height="80" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
        <text x="50" y="30" text-anchor="middle" class="badge-text" font-size="22">🔥</text>
        <text x="50" y="52" text-anchor="middle" class="badge-text">Firebase</text>
        <text x="50" y="66" text-anchor="middle" class="badge-sub">Realtime DB</text>
